<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILipKOS // Renders</title>
    
    <!-- Same distinct fonts for consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #121214;
            --surface-color: #1c1c1f;
            --border-color: #333336;
            --text-main: #ededed;
            --text-muted: #8a8a93;
            --accent: #b28dff; 
            --radius: 8px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Work Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .wrapper {
            max-width: 1200px; /* Wider for gallery */
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: end;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            margin: 0;
            line-height: 1;
        }

        .sub-head {
            color: var(--text-muted);
            margin: 5px 0 0 0;
        }

        /* Navigation Button */
        .btn-back {
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            background: var(--surface-color);
            transition: 0.2s;
        }

        .btn-back:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* The Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        /* Image Cards */
        .art-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 10px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .art-card:hover {
            transform: translateY(-4px);
            border-color: var(--text-muted);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 16 / 9; /* Enforces consistent height */
            background: #000;
            overflow: hidden;
            border-radius: 4px;
            cursor: zoom-in;
        }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Crops image cleanly */
            transition: opacity 0.3s;
        }

        .art-card img:hover {
            opacity: 0.9;
        }

        .caption {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Modal (Lightbox) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        
        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div>
                <h1>Selected Renders</h1>
                <p class="sub-head">SFM Artwork</p>
            </div>
            <!-- Update the href to point to your actual home page file -->
            <a href="https://filipkos-gacha.github.io" class="btn-back">← Back to Home</a>
        </header>

        <section class="gallery-grid">
            <!-- Item 1 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/Dont even hide.png" alt="Don't even hide.." loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Don't even hide..</div>
            </div>

            <!-- Item 2 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/Epic render.png" alt="Epic walking out of fire" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Eeee...pic render.</div>
            </div>

            <!-- Item 3 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/Test pose1.png" alt="Test pose on Gordon Freeman" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Gordon Freeman Test Pose</div>
            </div>

            <!-- Item 4 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/Test pose2.png" alt="Test pose on Zombie Police" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Zombie Police</div>
            </div>

            <!-- Item 5 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/Enough....png" alt="Multiple personalities" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">"Enough..."</div>
            </div>

            <!-- Item 6 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/ww2.png" alt="World War 2 Scene" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Made using Day of Defeat: Source's models</div>
            </div>

            <!-- Item 7 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/posingtestrender.png" alt="Test poses" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Posing Test Render</div>
            </div>

            <!-- Item 8 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/You won't come alive from this..png" alt="Death awaits you" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">"You won't come alive..."</div>
            </div>

            <!-- Item 9 -->
            <div class="art-card">
                <div class="img-container">
                    <img src="images/witheredbonnietestposerender2.png" alt="Bonnie...?" loading="lazy" onclick="openModal(this)">
                </div>
                <div class="caption">Withered Bonnie Pose Test</div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 FILipKOS | <a href="https://github.com/FILipKOS-Gacha">GitHub Profile</a></p>
        </footer>
    </div>

    <!-- The Image Modal -->
    <div id="imageModal" class="modal" onclick="closeModal(event)">
        <span class="close-modal" onclick="forceClose()">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");

        function openModal(element) {
            modal.style.display = "flex"; // Uses flex to center
            modalImg.src = element.src;
        }

        // Close if clicking the dark background (but not the image itself)
        function closeModal(e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        }

        // Close when clicking the X button
        function forceClose() {
            modal.style.display = "none";
        }

        // Close on 'Escape' key for better accessibility
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                forceClose();
            }
        });
    </script>
</body>
</html>
