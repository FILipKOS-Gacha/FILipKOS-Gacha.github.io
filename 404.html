<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white;
            overflow: hidden;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <img id="random-image" alt="404 Page Not Found">

    <script>
        const images = [
            'files/404.png',
            'files/404_1.png'
        ];

        const randomIndex = Math.floor(Math.random() * images.length);
        document.getElementById('random-image').src = images[randomIndex];
    </script>
</body>
</html>
