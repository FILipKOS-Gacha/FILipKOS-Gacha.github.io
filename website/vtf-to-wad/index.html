<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAD3_Forge | FILipKOS</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px);
            background-size: 20px 20px;
            color: #d8d8d8;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .tool-window {
            background: #2b2b2b;
            border-bottom: 2px solid #0f0f0f;
            border-right: 2px solid #0f0f0f;
            border-top: 1px solid #4a4a4a;
            border-left: 1px solid #4a4a4a;
            width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            box-shadow: 12px 12px 20px rgba(0,0,0,0.8);
        }

        .title-bar {
            background: #f39c12; 
            color: #111;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            user-select: none;
            border-bottom: 1px solid #111;
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .author-tag {
            text-align: right;
            font-size: 11px;
            color: #777;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .author-tag span { color: #f39c12; font-weight: bold; }

        .drop-zone {
            background: #1e1e1e;
            border: 2px dashed #555;
            padding: 30px;
            text-align: center;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background: #252525;
            border-color: #f39c12;
            color: #fff;
        }

        .settings-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .settings-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            margin-bottom: 4px;
            color: #aaa;
            text-transform: uppercase;
        }

        input {
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #111;
            border-bottom: 1px solid #4a4a4a;
            border-right: 1px solid #4a4a4a;
            padding: 7px;
            font-size: 12px;
            font-family: inherit;
        }

        .terminal {
            flex: 1;
            background: #0a0a0a;
            color: #4CAF50;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            border: 1px inset #444;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        
        .log-warn { color: #f39c12; }
        .log-err { color: #ff3333; }
        .log-success { color: #00ff00; }

        button {
            background: #3a3a3a;
            color: #fff;
            border-top: 1px solid #666;
            border-left: 1px solid #666;
            border-bottom: 2px solid #0f0f0f;
            border-right: 2px solid #0f0f0f;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { background: #4a4a4a; }
        button:active {
            border-top: 2px solid #0f0f0f;
            border-left: 2px solid #0f0f0f;
            border-bottom: 1px solid #666;
            border-right: 1px solid #666;
            background: #2a2a2a;
        }
        button:disabled { background: #222; color: #555; border-color: #111; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="tool-window">
        <div class="title-bar">
            <div>WAD3_Forge.exe</div>
        </div>
        
        <div class="content">
            <div class="author-tag">Written by <span>FILipKOS</span></div>

            <div class="settings-row">
                <div class="settings-col">
                    <label>Output WAD File Name</label>
                    <input type="text" id="wadName" value="custom_textures.wad">
                </div>
                <div class="settings-col">
                    <label>Auto-Scale Mode</label>
                    <input type="text" value="Force multiples of 16 (Max 512x512)" disabled>
                </div>
            </div>

            <div class="drop-zone" id="dropZone">
                <p style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">DRAG AND DROP .PNG / .JPG FILES HERE</p>
                <p style="font-size: 11px;">(Export your Source .VTF files to .PNG via VTFEdit first)</p>
                <input type="file" id="fileInput" multiple accept="image/png, image/jpeg" style="display:none;">
            </div>

            <label style="color: #f39c12;">Compiler Console:</label>
            <div class="terminal" id="terminal">> WAD3 Compiler initialized... Awaiting input.</div>

            <button id="compileBtn" disabled>Compile GoldSource .WAD</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const terminal = document.getElementById('terminal');
        const compileBtn = document.getElementById('compileBtn');
        const wadNameInput = document.getElementById('wadName');

        let pendingFiles = [];
        let lumps = [];

        function log(msg, type = '') {
            const div = document.createElement('div');
            if (type) div.className = `log-${type}`;
            div.textContent = `> ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Drag and Drop Logic
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            for (let f of files) {
                if (f.type.startsWith('image/')) {
                    pendingFiles.push(f);
                    log(`Queued texture: ${f.name}`);
                }
            }
            if (pendingFiles.length > 0) {
                compileBtn.disabled = false;
                compileBtn.textContent = `Compile ${pendingFiles.length} Textures to .WAD`;
            }
        }

        compileBtn.addEventListener('click', async () => {
            compileBtn.disabled = true;
            lumps = [];
            log(`\n--- INITIATING WAD3 BUILD ---`, 'warn');

            for (let file of pendingFiles) {
                await processImage(file);
            }

            log(`\nAll textures crunched. Compiling WAD directory...`, 'warn');
            buildWAD();
        });

        // --------------------------------------------------------
        // IMAGE PROCESSING & GOLDSOURCE COMPRESSION
        // --------------------------------------------------------
        async function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let texName = file.name.substring(0, file.name.lastIndexOf('.')).substring(0, 15).toUpperCase();
                        texName = texName.replace(/[^A-Z0-9_{}]/g, '_');

                        // GoldSource restricts dimensions to multiples of 16. Max is usually 512.
                        let w = Math.round(img.width / 16) * 16;
                        let h = Math.round(img.height / 16) * 16;
                        if (w < 16) w = 16; if (h < 16) h = 16;
                        if (w > 512) w = 512; if (h > 512) h = 512;

                        log(`Processing [${texName}] -> Rescaled to ${w}x${h}...`);

                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Mipmap generation
                        const mips = [];
                        let curW = w;
                        let curH = h;

                        for (let i = 0; i < 4; i++) {
                            canvas.width = curW;
                            canvas.height = curH;
                            ctx.drawImage(img, 0, 0, curW, curH);
                            mips.push(ctx.getImageData(0, 0, curW, curH));
                            curW = Math.max(1, Math.floor(curW / 2));
                            curH = Math.max(1, Math.floor(curH / 2));
                        }

                        // Generate 256 Color Palette (Popularity Quantization)
                        log(`  -> Calculating 8-bit palette...`);
                        const { palette, cache } = generatePalette(mips[0].data);

                        log(`  -> Mapping mipmaps to 8-bit indexing...`);
                        const mipIndices = mips.map(mip => mapPixelsToPalette(mip.data, palette, cache));

                        // Build MIPTEX Lump
                        const lumpData = buildMiptexLump(texName, w, h, mipIndices, palette);
                        lumps.push({ name: texName, data: lumpData });
                        
                        log(`  -> SUCCESS: Stored in memory.`, 'success');
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // Extremely fast Popularity-based Color Quantization
        function generatePalette(pixels) {
            const freq = {};
            for (let i = 0; i < pixels.length; i += 4) {
                const rgb = (pixels[i] << 16) | (pixels[i+1] << 8) | pixels[i+2];
                freq[rgb] = (freq[rgb] || 0) + 1;
            }

            const sortedColors = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);
            const palette = [];
            for (let i = 0; i < Math.min(256, sortedColors.length); i++) {
                const rgb = parseInt(sortedColors[i], 10);
                palette.push({ r: (rgb >> 16) & 255, g: (rgb >> 8) & 255, b: rgb & 255 });
            }

            // Fill remainder with black if less than 256 unique colors
            while (palette.length < 256) palette.push({ r: 0, g: 0, b: 0 });
            return { palette, cache: {} };
        }

        // Map true-color pixels to their nearest 8-bit index
        function mapPixelsToPalette(pixels, palette, cache) {
            const indices = new Uint8Array(pixels.length / 4);
            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i]; const g = pixels[i+1]; const b = pixels[i+2];
                const key = (r << 16) | (g << 8) | b;
                
                if (cache[key] !== undefined) {
                    indices[i/4] = cache[key];
                } else {
                    let minDist = Infinity;
                    let bestIndex = 0;
                    for (let j = 0; j < 256; j++) {
                        const p = palette[j];
                        const dr = r - p.r; const dg = g - p.g; const db = b - p.b;
                        const dist = dr*dr + dg*dg + db*db; // Fast Euclidean
                        if (dist < minDist) { minDist = dist; bestIndex = j; }
                    }
                    cache[key] = bestIndex;
                    indices[i/4] = bestIndex;
                }
            }
            return indices;
        }

        // --------------------------------------------------------
        // WAD3 FORMAT COMPILER
        // --------------------------------------------------------
        function buildMiptexLump(name, w, h, mips, palette) {
            const p0Size = w * h;
            const p1Size = mips[1].length;
            const p2Size = mips[2].length;
            const p3Size = mips[3].length;

            const offset0 = 40; 
            const offset1 = offset0 + p0Size;
            const offset2 = offset1 + p1Size;
            const offset3 = offset2 + p2Size;
            const palOffset = offset3 + p3Size;

            const lumpSize = palOffset + 2 + 768 + 2; 
            const buffer = new ArrayBuffer(lumpSize);
            const view = new DataView(buffer);
            const u8 = new Uint8Array(buffer);

            // Write Name (16 bytes, null padded)
            for (let i = 0; i < 16; i++) {
                view.setUint8(i, i < name.length ? name.charCodeAt(i) : 0);
            }
            
            // Width, Height, Offsets
            view.setUint32(16, w, true);
            view.setUint32(20, h, true);
            view.setUint32(24, offset0, true);
            view.setUint32(28, offset1, true);
            view.setUint32(32, offset2, true);
            view.setUint32(36, offset3, true);

            // Write Mipmaps
            u8.set(mips[0], offset0);
            u8.set(mips[1], offset1);
            u8.set(mips[2], offset2);
            u8.set(mips[3], offset3);

            // Write Palette (Size 256, then 768 bytes RGB)
            view.setUint16(palOffset, 256, true);
            let pIdx = palOffset + 2;
            for (let i = 0; i < 256; i++) {
                u8[pIdx++] = palette[i].r;
                u8[pIdx++] = palette[i].g;
                u8[pIdx++] = palette[i].b;
            }
            
            // 2 Bytes padding at the end
            view.setUint16(pIdx, 0, true);

            return u8;
        }

        function buildWAD() {
            const headerSize = 12;
            const dirEntrySize = 32;
            const numLumps = lumps.length;
            
            let totalLumpSize = 0;
            lumps.forEach(l => totalLumpSize += l.data.length);

            const dirOffset = headerSize + totalLumpSize;
            const totalFileSize = dirOffset + (numLumps * dirEntrySize);
            
            const buffer = new ArrayBuffer(totalFileSize);
            const view = new DataView(buffer);
            const u8 = new Uint8Array(buffer);

            // WRITE WAD HEADER
            u8[0] = 87; u8[1] = 65; u8[2] = 68; u8[3] = 51; // "WAD3"
            view.setUint32(4, numLumps, true);
            view.setUint32(8, dirOffset, true);

            // WRITE LUMPS
            let curOffset = 12;
            const lumpMeta = [];
            for (let l of lumps) {
                u8.set(l.data, curOffset);
                lumpMeta.push({ name: l.name, offset: curOffset, size: l.data.length });
                curOffset += l.data.length;
            }

            // WRITE DIRECTORY
            let dirIdx = dirOffset;
            for (let meta of lumpMeta) {
                view.setUint32(dirIdx, meta.offset, true);
                view.setUint32(dirIdx + 4, meta.size, true); // DiskSize
                view.setUint32(dirIdx + 8, meta.size, true); // Size
                view.setUint8(dirIdx + 12, 0x43); // Type: 67 (MIPTEX)
                view.setUint8(dirIdx + 13, 0x00); // Compression
                view.setUint16(dirIdx + 14, 0x00, true); // Padding
                
                // Name
                for (let i = 0; i < 16; i++) {
                    view.setUint8(dirIdx + 16 + i, i < meta.name.length ? meta.name.charCodeAt(i) : 0);
                }
                dirIdx += 32;
            }

            // TRIGGER DOWNLOAD
            log(`WAD Compilation Complete! (${(totalFileSize / 1024 / 1024).toFixed(2)} MB)`, 'success');
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = wadNameInput.value || "custom_textures.wad";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            pendingFiles = [];
            compileBtn.textContent = "Awaiting New Textures...";
        }
    </script>
</body>
</html>
